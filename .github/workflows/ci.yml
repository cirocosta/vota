name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: 1.26.5
          cache: true
      - name: Verify modules
        run: go mod verify
      - name: Unit, integration, and end-to-end tests
        run: go test ./... -count=1
      - name: Race tests
        run: go test -race ./... -count=1
      - name: Vet
        run: go vet ./...
      - name: Staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@v0.7.0
          staticcheck ./...
      - name: Vulnerability reachability
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.6.0
          govulncheck ./...
      - name: Fuzz smoke tests
        run: |
          go test ./internal/crypto/lrs -run '^$' -fuzz '^FuzzParseSignature$' -fuzztime=5s
          go test ./internal/crypto/election -run '^$' -fuzz '^FuzzArtifactParsers$' -fuzztime=5s
      - name: Benchmark compilation
        run: |
          go test ./internal/crypto/lrs -run '^$' -bench 'Benchmark(Sign|Verify)$' -benchtime=1x
          go test ./internal/crypto/election -run '^$' -bench 'Benchmark(BallotProof|ThresholdTally)$' -benchtime=1x
      - name: Secret scan
        run: |
          go install github.com/zricethezav/gitleaks/v8@v8.30.1
          gitleaks git . --redact --no-banner
